<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #9ca3af;
      margin-bottom: 25px;
    }

    .email {
      display: inline-block;
      text-decoration: none;
      background: #22c55e;
      color: #022c22;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.2s;
    }

    .email:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Support</h1>
    <p>Need help or have a question? Reach out anytime.</p>

    <a class="email" href="mailto:ggnnnggnn@gmail.com">
      Contact Support
    </a>

    <div class="footer">
      © 2026 Your App
    </div>
  </div>

</body>
</html>
